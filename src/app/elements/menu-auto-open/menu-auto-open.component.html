<div class="app-nav-item" [matMenuTriggerFor]="menu" #menuTrigger="matMenuTrigger"
  (pointerenter)="onPointerEnter($event, menuTrigger)" (pointerleave)="onPointerLeave($event, menuTrigger)">
  <ng-content select="[trigger]"></ng-content>
</div>
<mat-menu #menu="matMenu" [hasBackdrop]="false">
  <div (pointerenter)="onPointerEnter($event, menuTrigger)" (pointerleave)="onPointerLeave($event, menuTrigger)">
    <ng-content select="[content]"></ng-content>
  </div>
</mat-menu>
